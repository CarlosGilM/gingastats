services:
  redis:
    image: redis:alpine
    container_name: ginga-redis
    ports:
      - '6379:6379'
    restart: unless-stopped

  api:
    container_name: ginga-api
    build:
      context: ./gingastats-api
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - ./gingastats-api/.env
    depends_on:
      - redis
    restart: unless-stopped

  web:
    container_name: ginga-web
    build:
      context: ./gingastats-web
      dockerfile: Dockerfile
    ports:
      - '5173:80'
    depends_on:
      - api
    restart: unless-stopped
