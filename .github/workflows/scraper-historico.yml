name: Scraper Histórico (manual)

on:
  workflow_dispatch: # apenas manual — rode uma vez para popular o banco

jobs:
  coletar-historico:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: gingastats-scrapper/requirements.txt

      - name: Instalar dependências
        run: pip install -r gingastats-scrapper/requirements.txt

      - name: Instalar Chromium (Playwright)
        run: playwright install chromium --with-deps

      - name: Rodar coleta histórica
        run: python gingastats-scrapper/historico.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
