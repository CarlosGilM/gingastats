name: Scraper Semanal

on:
  schedule:
    # Toda segunda-feira às 08:00 BRT (11:00 UTC)
    - cron: '0 11 * * 1'
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  coletar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: gingastats-scrapper/requirements.txt

      - name: Instalar dependências
        run: pip install -r gingastats-scrapper/requirements.txt

      - name: Instalar Chromium (Playwright)
        run: playwright install chromium --with-deps

      - name: Rodar coleta semanal
        run: python gingastats-scrapper/coleta-semanal.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
